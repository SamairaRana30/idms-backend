<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - IDMS</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">Login</h3>
                </div>
                <div class="card-body">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Login</button>
                    </form>

                    <div id="responseMsg" class="mt-3"></div>
                    <a href="register.html" class="btn btn-link mt-2 d-block text-center">Don't have an account? Register</a>
                    <a href="index.html" class="btn btn-link d-block text-center">Back to Home</a>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Your JS -->
<script type="module">
    import { login } from './js/api.js';
    
    // Pre-fill email if coming from registration
    const registeredEmail = localStorage.getItem('registered_email');
    if (registeredEmail) {
        document.getElementById("email").value = registeredEmail;
        localStorage.removeItem('registered_email');
    }
    
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const responseMsg = document.getElementById("responseMsg");
        
        // Clear previous message
        responseMsg.innerHTML = '';
        
        if (!email || !password) {
            responseMsg.innerHTML = '<div class="alert alert-danger">Please fill all fields</div>';
            return;
        }
        
        try {
            const result = await login(email, password);
            
            console.log("Login response:", result);
            
            // Check if login was successful
            if (result.token || result.accessToken || result.data?.token) {
                // Store token for authenticated requests
                const token = result.token || result.accessToken || result.data?.token;
                localStorage.setItem('authToken', token);
                localStorage.setItem('userEmail', email);
                
                responseMsg.innerHTML = '<div class="alert alert-success">✅ Login successful! Redirecting to dashboard...</div>';
                
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 1500);
            } else {
                const errorMsg = result.message || result.error || "Invalid credentials";
                responseMsg.innerHTML = `<div class="alert alert-danger">❌ Login failed: ${errorMsg}</div>`;
            }
            
        } catch (err) {
            console.error("Login error:", err);
            responseMsg.innerHTML = `<div class="alert alert-danger">❌ Login failed: ${err.message || "Network error"}</div>`;
        }
    });
</script>

</body>
</html>
