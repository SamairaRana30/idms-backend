<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<style>
body {
    font-family: Arial;
    background:#f8f9fc;
}
.header {
    background:#4e73df;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
}
.container {
    padding:20px;
}
.card {
    background:white;
    padding:20px;
    margin:10px;
    border-radius:10px;
    display:inline-block;
    width:200px;
}
button {
    padding:8px 12px;
}
</style>
</head>

<body>

<script>
if (localStorage.getItem("login") !== "true") {
    window.location.href = "login.html";
}
</script>

<div class="header">
<h2>IDMS Dashboard</h2>
<button onclick="logout()">Logout</button>
</div>

<div class="container">
<div class="card">Members: 100</div>
<div class="card">Documents: 50</div>
<div class="card">Meetings: 12</div>
</div>

<script>
function logout() {
    localStorage.removeItem("login");
    window.location.href = "login.html";
}
</script>

</body>
</html>
