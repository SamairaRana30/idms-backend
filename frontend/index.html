<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDMS Frontend</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center">
                <div class="card shadow">
                    <div class="card-body p-5">
                        <h1 class="text-primary mb-3">Welcome to IDMS 🚀</h1>
                        <p class="lead">Identity Management System</p>
                        <p class="text-muted">If you see this, your frontend is working!</p>

                        <div class="mt-4" id="authButtons">
                            <a href="register.html" class="btn btn-outline-primary me-2">Register</a>
                            <a href="login.html" class="btn btn-outline-secondary me-2">Login</a>
                            <a href="dashboard.html" class="btn btn-primary">Go to Dashboard</a>
                        </div>
                        
                        <div class="mt-3" id="userInfo" style="display: none;">
                            <div class="alert alert-success">
                                Welcome back, <strong id="userEmail"></strong>!
                            </div>
                            <button id="logoutBtn" class="btn btn-danger btn-sm">Logout</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="js/app.js"></script>
    
    <script>
        // Check if user is already logged in
        const token = localStorage.getItem('authToken');
        const userEmail = localStorage.getItem('userEmail');
        
        if (token && userEmail) {
            // Show logged-in UI
            document.getElementById('authButtons').style.display = 'none';
            document.getElementById('userInfo').style.display = 'block';
            document.getElementById('userEmail').textContent = userEmail;
        }
        
        // Logout functionality
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', function() {
                localStorage.removeItem('authToken');
                localStorage.removeItem('userEmail');
                window.location.reload();
            });
        }
    </script>
</body>
</html>
